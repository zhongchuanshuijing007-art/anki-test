<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗記テスト管理</title>

<style>
body{
font-family:sans-serif;
padding:10px;
}

button{
margin:6px 0;
padding:10px 16px;
font-size:16px;
width:100%;
max-width:300px;
}

input,select{
padding:10px;
font-size:16px;
width:100%;
max-width:300px;
margin:4px 0;
}

table{
width:100%;
font-size:14px;
}

.hidden{
display:none;
}
</style>

</head>
<body>

<h1>暗記テスト管理</h1>

<!-- ================= 先生エリア ================= -->

<div id="teacherArea">

<h2>単元設定</h2>
<input id="unitName" placeholder="単元名">
<button onclick="setUnit()">単元を設定</button>
<p>現在の単元：<span id="currentUnit">未設定</span></p>

<h2>問題追加</h2>
<input id="questionText" placeholder="問題">
<input id="answerText" placeholder="正解（カンマ区切り）">
<button onclick="addQuestion()">問題追加</button>

<h2>問題一覧</h2>
<ul id="questionList"></ul>

<h2>生徒追加</h2>
<input id="studentName" placeholder="名前">
<input id="studentPass" type="password" placeholder="パスワード">
<button onclick="addStudent()">追加</button>

<h2>生徒一覧</h2>

<table border="1">

<thead>
<tr>
<th>名前</th>
<th>点数</th>
<th>削除</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<hr>

<h2>生徒ログイン</h2>

<select id="loginStudent"></select>

<input id="loginPass" type="password" placeholder="パスワード">

<button onclick="loginStudent()">ログイン</button>

</div>

<!-- ================= 生徒ページ ================= -->

<div id="studentArea" class="hidden">

<h2 id="welcome"></h2>

<button onclick="startStudentTest()">テスト開始</button>

<button onclick="logout()">ログアウト</button>

<h3>あなたの点数</h3>

<p id="myScore">未受験</p>

<div id="studentTestArea"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyxNXxTiEsqsyBc6yWk2SOE7-sXklWlEw",
  authDomain: "anki-test-system.firebaseapp.com",
  projectId: "anki-test-system",
  storageBucket: "anki-test-system.firebasestorage.app",
  messagingSenderId: "1084360201224",
  appId: "1:1084360201224:web:b447d41ded709f15012dbd"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.db = db;

let students = [];

let questions = {};

let currentUnit = "";

let loginIndex = null;

function normalize(text){

return (text || "")

.trim()

.toLowerCase()

.replace(/[　\s]/g,"")

.replace(/[。、,.]/g,"");

}

window.setUnit=function(){

currentUnit=document.getElementById("unitName").value.trim();

document.getElementById("currentUnit").textContent=currentUnit||"未設定";

renderTable();

renderQuestions();

}

window.addStudent=async function(){

const name=document.getElementById("studentName").value.trim();

const pass=document.getElementById("studentPass").value.trim();

if(!name||!pass)return alert("入力不足");

await addDoc(collection(db,"students"),{

name:name,

password:pass,

scores:{}

});

loadStudents();

}

async function loadStudents(){

students=[];

const snap=await getDocs(collection(db,"students"));

snap.forEach(docSnap=>{

students.push({

id:docSnap.id,

...docSnap.data()

});

});

renderTable();

updateStudentSelect();

}

window.deleteStudent=async function(i){

if(!confirm("削除しますか？"))return;

await deleteDoc(doc(db,"students",students[i].id));

loadStudents();

}

function renderTable(){

const tbody=document.getElementById("studentTable");

tbody.innerHTML="";

students.forEach((s,i)=>{

const score=currentUnit&&s.scores[currentUnit]!==undefined

?s.scores[currentUnit]

:"";

tbody.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${score}</td>

<td><button onclick="deleteStudent(${i})">削除</button></td>

</tr>

`;

});

}

window.addQuestion=async function(){

if(!currentUnit)return alert("単元設定");

const q=document.getElementById("questionText").value.trim();

const raw=document.getElementById("answerText").value.trim();

if(!q||!raw)return alert("入力不足");

const answers=raw

.split(/[,\uFF0C]/)

.map(a=>normalize(a))

.filter(a=>a!="");

await addDoc(collection(db,"questions"),{

unit:currentUnit,

question:q,

answers:answers

});

loadQuestions();

}

async function loadQuestions(){

questions={};

const snap=await getDocs(collection(db,"questions"));

snap.forEach(docSnap=>{

const data=docSnap.data();

if(!questions[data.unit])questions[data.unit]=[];

questions[data.unit].push({

id:docSnap.id,

question:data.question,

answers:data.answers

});

});

renderQuestions();

}

window.deleteQuestion=async function(i){

if(!confirm("削除しますか？"))return;

await deleteDoc(doc(db,"questions",questions[currentUnit][i].id));

loadQuestions();

}

function renderQuestions(){

const list=document.getElementById("questionList");

list.innerHTML="";

if(!questions[currentUnit])return;

questions[currentUnit].forEach((q,i)=>{

const li=document.createElement("li");

li.innerHTML=

`${q.question} → ${q.answers.join(" / ")}

<button onclick="deleteQuestion(${i})">削除</button>`;

list.appendChild(li);

});

}

function updateStudentSelect(){

const select=document.getElementById("loginStudent");

select.innerHTML="";

students.forEach((s,i)=>{

const op=document.createElement("option");

op.value=i;

op.textContent=s.name;

select.appendChild(op);

});

}

window.loginStudent=function(){

const index=document.getElementById("loginStudent").value;

const pass=document.getElementById("loginPass").value;

const s=students[index];

if(!s||s.password!==pass){

alert("パスワード違い");

return;

}

loginIndex=index;

document.getElementById("teacherArea").classList.add("hidden");

document.getElementById("studentArea").classList.remove("hidden");

document.getElementById("welcome").textContent=s.name+"のマイページ";

updateMyScore();

}

window.logout=function(){

loginIndex=null;

document.getElementById("teacherArea").classList.remove("hidden");

document.getElementById("studentArea").classList.add("hidden");

}

window.startStudentTest=function(){

const qs=questions[currentUnit];

if(!qs)return alert("問題なし");

const area=document.getElementById("studentTestArea");

area.innerHTML="";

qs.forEach((q,i)=>{

area.innerHTML+=`

<p>Q${i+1}. ${q.question}</p>

<input id="stu_ans_${i}">

`;

});

area.innerHTML+=`<br><button onclick="gradeStudentTest()">採点</button>`;

}

window.gradeStudentTest=async function(){

const qs=questions[currentUnit];

let correct=0;

qs.forEach((q,i)=>{

const input=document.getElementById(`stu_ans_${i}`);

if(!input)return;

const users=input.value

.split(/[,\uFF0C]/)

.map(a=>normalize(a))

.filter(a=>a!="");

const ok=users.some(user=>

q.answers.some(ans=>user.includes(ans)||ans.includes(user))

);

if(ok)correct++;

});

const score=Math.round((correct/qs.length)*100);

const student=students[loginIndex];

student.scores[currentUnit]=score;

await updateDoc(doc(db,"students",student.id),{

scores:student.scores

});

alert("点数："+score);

updateMyScore();

}

function updateMyScore(){

const s=students[loginIndex];

const score=currentUnit&&s.scores[currentUnit]!==undefined

?s.scores[currentUnit]

:"未受験";

document.getElementById("myScore").textContent=score;

}

loadStudents();

loadQuestions();

</script>

</body>
</html>
